name: Vietnamvpn Auto Build Full

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build và Gom đồ đầy đủ
        run: |
          go mod tidy
          # 1. Tạo một cái túi "build_assets" để gom tất cả vào đây
          mkdir -p build_assets

          # 2. Build cục lõi XrayR ném vào túi
          go build -o build_assets/XrayR -trimpath -ldflags "-s -w" main.go
          
          # 3. Nhặt các file thông tin cơ bản
          cp README.md LICENSE build_assets/ 2>/dev/null || true

          # 4. Nhặt sạch các file cấu hình trong thư mục release/config
          # (Đoạn này cực kỳ quan trọng để install.sh không báo thiếu file)
          cp release/config/dns.json build_assets/
          cp release/config/route.json build_assets/
          cp release/config/custom_outbound.json build_assets/
          cp release/config/custom_inbound.json build_assets/
          cp release/config/rulelist build_assets/
          # Đổi tên file mẫu thành file config.yml chính thức
          cp release/config/config.yml.example build_assets/config.yml

          # 5. Đi "mua" thêm 2 file dữ liệu địa lý
          curl -L https://github.com/v2fly/geoip/releases/latest/download/geoip.dat -o build_assets/geoip.dat
          curl -L https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat -o build_assets/geosite.dat
          
          # 6. Đóng gói cái túi đó lại thành file zip
          cd build_assets
          zip -9vr ../XrayR-linux-64.zip .

      - name: Đẩy hàng FULL lên Release
        uses: softprops/action-gh-release@v2
        with:
          files: XrayR-linux-64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
