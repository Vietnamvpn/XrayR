name: Vietnamvpn Auto Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build and Zip
        run: |
          go mod tidy
          # Build bản độ của bác
          go build -o XrayR -trimpath -ldflags "-s -w" main.go
          zip XrayR-linux-64.zip XrayR

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: XrayR-linux-64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
